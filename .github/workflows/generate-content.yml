name: Generate Content

on:
  push:
    branches:
      - main
    paths:
      - "projects/**/*.html"
      - "journal/**/*.html"
      - "scripts/generate-content.mjs"
      - ".github/workflows/generate-content.yml"

jobs:
  refresh-content:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate content feed
        run: node scripts/generate-content.mjs

      - name: Commit generated content
        run: |
          if git diff --quiet -- assets/js/content.js; then
            echo "No generated content changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/js/content.js
          git commit -m "chore: refresh generated site content"
          git push
